name: Frontend CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    # branches: ["production", "uat"]
    branches: ["production"]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure Build Environment
        id: config
        run: |
          if [ "${{ github.ref_name }}" = "production" ]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=uat" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: hmcrycat/flashcard-web:${{ steps.config.outputs.IMAGE_TAG }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SITE_URL=${{ vars.VITE_SITE_URL }}

  deploy:
    name: Deploy to Render
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}
    steps:
      - name: Trigger Render Deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -X POST "$DEPLOY_HOOK"
            echo "Deployment triggered successfully for environment ${{ github.ref_name }}."
          else
            echo "RENDER_FRONTEND_DEPLOY_HOOK secret is not set. Skipping deployment trigger."
          fi
